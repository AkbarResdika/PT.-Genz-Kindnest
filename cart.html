<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KindNest | Keranjang</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

<style>

.page-title{

text-align:center;

padding:60px;

}

.cart-container{

display:grid;

grid-template-columns:2fr 1fr;

gap:35px;

padding:0 8% 80px;

}

.cart-list{

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 10px 20px rgba(0,0,0,.08);

}

.cart-item{

display:flex;

align-items:center;

gap:25px;

padding:25px 0;

border-bottom:1px solid #eee;

}

.cart-item img{

width:140px;

height:140px;

object-fit:cover;

border-radius:20px;

}

.item-info{

flex:1;

}

.item-info h3{

margin-bottom:10px;

}

.qty{

display:flex;

align-items:center;

gap:15px;

margin-top:15px;

}

.qty button{

width:35px;

height:35px;

border:none;

border-radius:50%;

background:#ffb703;

color:white;

cursor:pointer;

}

.remove{

color:red;

cursor:pointer;

margin-top:15px;

display:inline-block;

}

.summary{

background:white;

padding:30px;

border-radius:20px;

height:fit-content;

box-shadow:0 10px 20px rgba(0,0,0,.08);

}

.summary h2{

margin-bottom:25px;

}

.summary-row{

display:flex;

justify-content:space-between;

margin:18px 0;

}

.checkout{

margin-top:30px;

width:100%;

padding:18px;

border:none;

background:#ffb703;

color:white;

font-weight:bold;

border-radius:40px;

cursor:pointer;

}

.checkout:hover{

background:#fb8500;

}

@media(max-width:900px){

.cart-container{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<div class="logo">🧸 KindNest</div>

<nav>

<nav>

<a href="index.html">Beranda</a>

<a href="barang-baru.html">Barang Baru</a>

<a href="barang-bekas.html">Barang Bekas</a>

<a href="seller-dashboard.html">Jual Barang</a>

<a href="profile.html">Profil</a>

<a href="cart.html">
<i class="fa-solid fa-cart-shopping"></i>
</a>

</nav>

<a href="cart.html">Keranjang</a>

</nav>

<div class="header-icon">

<i class="fa-solid fa-heart"></i>

<i class="fa-solid fa-cart-shopping"></i>

</div>

</header>

<section class="page-title">

<h1>Keranjang Belanja</h1>

<p>Periksa kembali produk sebelum checkout.</p>

</section>

<div class="cart-container">

<div class="cart-list">
    <div id="cartItemsContainer">
        <!-- cart items will be rendered here -->
    </div>
</div>

<div class="summary">

<h2>Ringkasan</h2>

<div class="summary-row">

<span>Subtotal</span>

<b>Rp0</b>

</div>

<div class="summary-row">

<span>Ongkir</span>

<b>Rp0</b>

</div>

<div class="summary-row">

<span>Voucher</span>

<b>-Rp0</b>

</div>

<hr>

<div class="summary-row">

<h3>Total</h3>

<h2 style="color:#ff9f1c">

Rp0

</h2>

</div>

<button class="checkout">

Checkout Sekarang

</button>

</div>

</div>

<script src="js/script.js"></script>
<script>
// Render cart from localStorage
function getCartItems(){
    return JSON.parse(localStorage.getItem('cartItems')) || [];
}

function saveCartItems(items){
    localStorage.setItem('cartItems', JSON.stringify(items));
    // update badge if any
    const evt = new Event('cartUpdated');
    window.dispatchEvent(evt);
}

function renderCart(){
    const container = document.getElementById('cartItemsContainer');
    const items = getCartItems();
    container.innerHTML = '';

    if(items.length === 0){
        container.innerHTML = '<p>Keranjang kosong.</p>';
    }

    let subtotal = 0;

    items.forEach(item => {
        subtotal += (item.price || 0) * (item.qty || 1);
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
            <img src="${item.image}">
            <div class="item-info">
                <h3>${item.title}</h3>
                <p>${item.category || ''}</p>
                <h2>Rp${(item.price||0).toLocaleString('id-ID')}</h2>
                <div class="qty">
                    <button data-id="${item.id}" class="qty-decr">-</button>
                    <span>${item.qty || 1}</span>
                    <button data-id="${item.id}" class="qty-incr">+</button>
                </div>
                <div class="remove" data-id="${item.id}">
                    <i class="fa-solid fa-trash"></i>
                    Hapus
                </div>
            </div>
        `;
        container.appendChild(div);
    });

    // update summary
    const ongkir = items.length ? 20000 : 0;
    const voucher = items.length ? 0 : 0;
    const total = subtotal + ongkir - voucher;

    const summary = document.querySelector('.summary');
    if(summary){
        summary.querySelector('.summary-row b').innerText = 'Rp' + subtotal.toLocaleString('id-ID');
        const rows = summary.querySelectorAll('.summary-row');
        if(rows.length>=2) rows[1].querySelector('b').innerText = 'Rp' + ongkir.toLocaleString('id-ID');
        if(rows.length>=3) rows[2].querySelector('b').innerText = (voucher ? '-Rp' + voucher.toLocaleString('id-ID') : '-Rp0');
        const totalEl = summary.querySelector('h2');
        if(totalEl) totalEl.innerText = 'Rp' + total.toLocaleString('id-ID');
    }

    // attach handlers
    container.querySelectorAll('.qty-incr').forEach(btn=>{
        btn.addEventListener('click', ()=> changeQty(btn.dataset.id, 1));
    });
    container.querySelectorAll('.qty-decr').forEach(btn=>{
        btn.addEventListener('click', ()=> changeQty(btn.dataset.id, -1));
    });
    container.querySelectorAll('.remove').forEach(btn=>{
        btn.addEventListener('click', ()=> removeItem(btn.dataset.id));
    });
}

function changeQty(id, delta){
    const items = getCartItems();
    const idx = items.findIndex(i=>i.id === id);
    if(idx === -1) return;
    items[idx].qty = Math.max(1, (items[idx].qty || 1) + delta);
    saveCartItems(items);
    renderCart();
}

function removeItem(id){
    let items = getCartItems();
    items = items.filter(i=>i.id !== id);
    saveCartItems(items);
    renderCart();
}

document.querySelector('.checkout').addEventListener('click', ()=>{
    window.location = 'checkout.html';
});

// listen for cart updates from other pages
window.addEventListener('cartUpdated', ()=>{
    renderCart();
});

// initial render
renderCart();

</script>

</body>

</html>
