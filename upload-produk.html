<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KindNest | Upload Produk</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

<style>

body{
font-family:Poppins,sans-serif;
background:#FFF8EE;
}

.container{
max-width:1100px;
margin:50px auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
margin-bottom:10px;
color:#ff9f1c;
}

.subtitle{
color:#777;
margin-bottom:35px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.group{
margin-bottom:22px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input,
select,
textarea{

width:100%;
padding:15px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;

}

textarea{
height:130px;
resize:none;
}

.preview{

margin-top:15px;
width:220px;
height:220px;
border:2px dashed #ccc;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

}

.preview img{

width:100%;
height:100%;
object-fit:cover;
display:none;

}

.publish{

margin-top:35px;
width:100%;
padding:18px;
border:none;
border-radius:40px;
background:#ffb703;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;

}

.publish:hover{

background:#fb8500;

}

.success{

display:none;
margin-top:25px;
padding:18px;
background:#dff6dd;
border-radius:12px;
color:#2e7d32;
font-weight:600;

}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.preview{
width:100%;
height:260px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>📦 Upload Produk</h1>

<p class="subtitle">
Jual barang baru atau bekas dengan mudah di KindNest.
</p>

<form id="uploadForm">

<div class="grid">

<div>

<div class="group">

<label>Nama Produk</label>

<input type="text" required>

</div>

<div class="group">

<label>Kategori</label>

<select>

<option>Pakaian Bayi</option>

<option>Stroller</option>

<option>Mainan</option>

<option>Baby Walker</option>

<option>Perlengkapan Makan</option>

<option>Lainnya</option>

</select>

</div>

<div class="group">

<label>Jenis Produk</label>

<select id="jenis">

<option>Barang Baru</option>

<option>Barang Bekas</option>

</select>

</div>

<div class="group">

<label>Harga</label>

<input type="number" placeholder="Rp">

</div>

<div class="group">

<label>Lokasi</label>

<input type="text" placeholder="Contoh: Bandung">

</div>

</div>

<div>

<div class="group">

<label>Upload Foto</label>

<input type="file" id="imageInput" accept="image/*">

<div class="preview">

<img id="previewImg">

<span id="placeholder">
Klik untuk memilih gambar
</span>

</div>

</div>

</div>

</div>

<div class="group">

<label>Deskripsi Produk</label>

<textarea placeholder="Tuliskan deskripsi produk..."></textarea>

</div>

<div class="grid">

<div class="group">

<label>Kondisi Barang</label>

<select>

<option>100% Baru</option>

<option>99%</option>

<option>95%</option>

<option>90%</option>

<option>85%</option>

</select>

</div>

<div class="group">

<label>Lama Pemakaian</label>

<select>

<option>Baru</option>

<option>< 6 Bulan</option>

<option>6 - 12 Bulan</option>

<option>1 - 2 Tahun</option>

<option>> 2 Tahun</option>

</select>

</div>

</div>

<button class="publish">

Publikasikan Produk

</button>

<div class="success" id="success">

✅ Produk berhasil dipublikasikan (simulasi).

</div>

</form>

</div>

<script>

const input=document.getElementById("imageInput");
const img=document.getElementById("previewImg");
const placeholder=document.getElementById("placeholder");

input.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

img.src=e.target.result;
img.style.display="block";
placeholder.style.display="none";

}

reader.readAsDataURL(file);

}

});

document.getElementById("uploadForm").onsubmit=function(e){

e.preventDefault();

document.getElementById("success").style.display="block";

window.scrollTo({

top:0,

behavior:"smooth"

});

};

</script>

</body>

</html>
